name: Research Pipeline

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday 06:00 UTC
  workflow_dispatch:
    inputs:
      live_check:
        description: "Probe evidence URLs for reachability"
        type: boolean
        default: false

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --system

      - name: Run research pipeline
        run: composio-research research --live-check ${{ inputs.live_check || false }}

      - name: Run verification
        run: composio-research verify

      - name: Run pattern analysis
        run: composio-research analyze

      - name: Build HTML report
        run: composio-research build-report

      - uses: actions/upload-artifact@v4
        with:
          name: research-output
          path: |
            data/research.json
            data/verification.json
            frontend/report.html
          retention-days: 90
